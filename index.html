<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpsCore</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #141414;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      padding: 50px 16px 80px;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 460px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }

    .date {
      font-size: 12px;
      color: #555;
    }

    /* ── Stats Bar ── */
    .stats {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .stat-pill {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat-pill .num {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      display: block;
    }

    .stat-pill .label {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
      display: block;
    }

    /* ── Input Area ── */
    .input-card {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    #todo-input {
      flex: 1;
      padding: 10px 12px;
      font-size: 14px;
      background: #141414;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #e0e0e0;
      outline: none;
    }

    #todo-input::placeholder { color: #444; }
    #todo-input:focus { border-color: #555; }

    #add-btn {
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      background: #ffffff;
      color: #141414;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }

    #add-btn:hover { background: #ddd; }

    /* Priority + Due date row */
    .input-meta {
      display: flex;
      gap: 8px;
    }

    .input-meta select,
    .input-meta input[type="date"] {
      flex: 1;
      padding: 7px 10px;
      font-size: 12px;
      background: #141414;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #888;
      outline: none;
      cursor: pointer;
    }

    .input-meta select option { background: #1e1e1e; }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .filter-btn {
      flex: 1;
      padding: 7px 0;
      font-size: 12px;
      font-weight: 500;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #555;
      cursor: pointer;
      text-align: center;
    }

    .filter-btn.active {
      background: #fff;
      color: #141414;
      border-color: #fff;
    }

    /* ── Search ── */
    #search-input {
      width: 100%;
      padding: 9px 12px;
      font-size: 13px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e0e0e0;
      outline: none;
      margin-bottom: 14px;
    }

    #search-input::placeholder { color: #444; }
    #search-input:focus { border-color: #555; }

    /* ── Todo List ── */
    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 14px;
    }

    .todo-item:hover {
      border-color: #3a3a3a;
    }

    /* Left accent line by priority */
    .todo-item.high   { border-left: 3px solid #e05252; }
    .todo-item.medium { border-left: 3px solid #e09a52; }
    .todo-item.low    { border-left: 3px solid #52a0e0; }

    .todo-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #aaa;
      flex-shrink: 0;
    }

    .todo-body {
      flex: 1;
      min-width: 0;
    }

    .todo-text {
      font-size: 14px;
      color: #e0e0e0;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #444;
    }

    .todo-due {
      font-size: 11px;
      color: #555;
      margin-top: 3px;
      display: block;
    }

    /* Priority badge */
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 99px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-high   { background: #2e1a1a; color: #e05252; }
    .badge-medium { background: #2e2218; color: #e09a52; }
    .badge-low    { background: #182330; color: #52a0e0; }

    /* Delete button */
    .del-btn {
      background: none;
      border: none;
      color: #333;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
      padding: 0 2px;
    }

    .del-btn:hover { color: #e05252; }

    /* ── Footer ── */
    .footer {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-text {
      font-size: 12px;
      color: #444;
    }

    #clear-btn {
      font-size: 12px;
      color: #e05252;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    #clear-btn:hover { text-decoration: underline; }

    /* ── Progress Bar ── */
    .progress-wrap {
      background: #2a2a2a;
      border-radius: 99px;
      height: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #fff;
      border-radius: 99px;
      width: 30%; /* controlled by your TS */
      transition: width 0.3s;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>OpsCore & WorkSphere</h1>
      <span class="date" id="today-date"></span>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-pill">
        <span class="num" id="stat-total">0</span>
        <span class="label">Total</span>
      </div>
      <div class="stat-pill">
        <span class="num" id="stat-done">0</span>
        <span class="label">Done</span>
      </div>
      <div class="stat-pill">
        <span class="num" id="stat-left">0</span>
        <span class="label">Left</span>
      </div>
    </div>
    

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    

    <!-- Input Card -->
    <div class="input-card">
      <div class="input-row">
        <input type="text" id="todo-input" placeholder="Add a new task…" autocomplete="off" />
        <button id="add-btn">Add</button>
      </div>
      <div class="input-meta">
        <select id="priority-select">
          <option value="low">🔵 Low</option>
          <option value="medium" selected>🟠 Medium</option>
          <option value="high">🔴 High</option>
        </select>
        <input type="date" id="due-date" />
      </div>
    </div>

    <!-- Search -->
    <input type="text" id="search-input" placeholder="🔍  Search tasks…" />

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
    </div>

    <!-- Task List -->
    <ul id="todo-list">
      <!-- Sample items so the UI looks populated -->
      <li class="todo-item high">
        <input type="checkbox" />
        <div class="todo-body">
          <span class="todo-text">Fix login bug on production</span>
          <span class="todo-due">Due: 2025-05-01</span>
        </div>
        <span class="badge badge-high">High</span>
        <button class="del-btn">&#x2715;</button>
        
      </li>
      <li class="todo-item medium done">
        <input type="checkbox" checked />
        
        <div class="todo-body">
          <span class="todo-text">write unit tests for auth module</span>
          <span class="todo-due">Due: 2025-04-28</span>
        </div>
        <span class="badge badge-medium">Medium with</span>
        <button class="del-btn">&#x2715;</button>
      </li>
      <li class="todo-item low">
        <input type="checkbox" />
        <div class="todo-body">
          <span class="todo-text">Update README documentation</span>
          <span class="todo-due">No due date</span>
        </div>
        <span class="badge badge-low">Low</span>
        <button class="del-btn">&#x2715;</button>
      </li>
    </ul>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-text">2 tasks remaining</span>
      <button id="clear-btn">Clear completed</button>
    </div>

  </div>

  <script src="./dist/index.js"></script>
</body>

</html>
